<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Aathi Eshwar — Creative Technologist</title>
  <meta name="description" content="Interactive portfolio of Aathi Eshwar — UI/UX Designer and Game Designer." />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700;800;900&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <style>
    :root{
      --bg:#02060c;
      --panel:rgba(7,16,30,.92);
      --panel2:rgba(11,25,46,.95);
      --cyan:#1ff3ff;
      --cyan-soft:#8ffaff;
      --pink:#ff3cd6;
      --pink-soft:#ff90eb;
      --gold:#ffd35f;
      --white:#eefaff;
      --muted:#a9c5da;
      --border:rgba(31,243,255,.16);
      --font-display:'Orbitron',sans-serif;
      --font-body:'Inter',sans-serif;
      --font-mono:'JetBrains Mono',monospace;
      --shadow-cyan:0 0 14px rgba(31,243,255,.55),0 0 34px rgba(31,243,255,.22);
      --shadow-pink:0 0 14px rgba(255,60,214,.55),0 0 34px rgba(255,60,214,.22);
      --shadow-gold:0 0 14px rgba(255,211,95,.48),0 0 32px rgba(255,211,95,.18);
    }

    *{box-sizing:border-box}
    html,body{
      margin:0;
      width:100%;
      height:100%;
      overflow:hidden;
      background:
        radial-gradient(circle at 50% 45%, rgba(31,243,255,.08), transparent 18%),
        radial-gradient(circle at 52% 52%, rgba(255,60,214,.06), transparent 18%),
        linear-gradient(180deg,#01040a 0%,#03101d 40%,#01050b 100%);
      color:var(--white);
      font-family:var(--font-body);
    }

    body::before{
      content:"";
      position:fixed;
      inset:0;
      pointer-events:none;
      background:repeating-linear-gradient(
        180deg,
        rgba(255,255,255,0) 0px,
        rgba(255,255,255,0) 3px,
        rgba(31,243,255,.015) 4px
      );
      mix-blend-mode:screen;
      opacity:.35;
      z-index:20;
    }

    #bg-canvas{
      position:fixed;
      inset:0;
      width:100%;
      height:100%;
      display:block;
      z-index:0;
    }

    #scene-wrap{
      position:fixed;
      inset:0;
      z-index:2;
      cursor:grab;
    }
    #scene-wrap.dragging{cursor:grabbing}

    #labels{
      position:fixed;
      inset:0;
      z-index:12;
      pointer-events:none;
    }

    .center-copy{
      position:fixed;
      inset:0;
      z-index:10;
      display:grid;
      place-items:center;
      pointer-events:none;
      text-align:center;
      padding:24px;
    }

    .hero{
      transform:translateY(18px);
      max-width:900px;
    }

    .hero-mark{
      position:relative;
      width:330px;
      height:330px;
      margin:0 auto 0;
      display:grid;
      place-items:center;
    }
    .ring-1,.ring-2{
      position:absolute;
      border-radius:50%;
      inset:18px;
      border:4px solid rgba(31,243,255,.78);
      box-shadow:var(--shadow-cyan);
    }
    .ring-2{
      inset:78px 54px;
      transform:rotate(-18deg);
      border-color:rgba(255,60,214,.7);
      box-shadow:var(--shadow-pink);
    }
    .mark-core{
      position:absolute;
      width:112px;height:112px;border-radius:50%;
      background:radial-gradient(circle at 35% 32%, #86ffff 0%, #3bc7ff 42%, #3a46ff 100%);
      box-shadow:0 0 24px rgba(31,243,255,.45);
      opacity:.88;
    }
    .mark-ae{
      position:absolute;
      top:58px;
      font-family:var(--font-display);
      font-size:clamp(82px,11vw,132px);
      font-weight:900;
      letter-spacing:.05em;
      color:var(--cyan);
      text-shadow:
        0 0 8px rgba(31,243,255,.95),
        0 0 22px rgba(31,243,255,.85),
        0 0 54px rgba(31,243,255,.36);
    }

    .hero-name{
      margin-top:-6px;
      font-family:var(--font-display);
      font-size:clamp(42px,6vw,86px);
      letter-spacing:.09em;
      font-weight:800;
      color:#f8fdff;
      text-transform:uppercase;
      text-shadow:
        0 0 10px rgba(255,255,255,.82),
        0 0 24px rgba(31,243,255,.22);
    }

    .hero-role{
      margin-top:14px;
      font-family:var(--font-display);
      font-size:clamp(18px,2vw,30px);
      letter-spacing:.18em;
      text-transform:uppercase;
      color:var(--pink-soft);
      text-shadow:
        0 0 10px rgba(255,60,214,.85),
        0 0 24px rgba(255,60,214,.26);
    }

    .hero-sub{
      margin-top:26px;
      font-family:var(--font-mono);
      font-size:clamp(12px,1.3vw,20px);
      letter-spacing:.22em;
      text-transform:uppercase;
      color:#c7f6ff;
      text-shadow:0 0 14px rgba(31,243,255,.16);
    }

    .hero-hint{
      margin-top:26px;
      font-family:var(--font-mono);
      font-size:14px;
      color:rgba(199,246,255,.78);
      letter-spacing:.18em;
      text-transform:uppercase;
      animation:pulse 2.2s ease-in-out infinite;
    }

    .node-label{
      position:absolute;
      transform:translate(-50%,-50%);
      pointer-events:auto;
      min-width:170px;
      text-align:center;
      user-select:none;
      transition:transform .25s ease, opacity .25s ease;
    }
    .node-label:hover{transform:translate(-50%,-52%) scale(1.02)}
    .node-icon{
      font-size:24px;
      margin-bottom:8px;
      filter:drop-shadow(0 0 8px rgba(255,255,255,.24));
    }
    .node-title{
      display:inline-flex;
      align-items:center;
      justify-content:center;
      min-height:52px;
      padding:12px 22px;
      font-family:var(--font-display);
      font-size:14px;
      letter-spacing:.17em;
      text-transform:uppercase;
      clip-path:polygon(12px 0,100% 0,calc(100% - 12px) 100%,0 100%);
      backdrop-filter:blur(12px);
      background:linear-gradient(180deg,rgba(9,24,44,.9),rgba(7,16,30,.92));
      border:1px solid rgba(255,255,255,.07);
    }
    .node-sub{
      margin-top:8px;
      font-family:var(--font-mono);
      font-size:12px;
      letter-spacing:.18em;
      text-transform:uppercase;
      color:rgba(239,250,255,.84);
    }

    .label-about .node-title{color:var(--cyan-soft);border-color:rgba(31,243,255,.26);box-shadow:var(--shadow-cyan)}
    .label-skills .node-title{color:var(--pink-soft);border-color:rgba(255,60,214,.24);box-shadow:var(--shadow-pink)}
    .label-experience .node-title{color:var(--cyan-soft);border-color:rgba(31,243,255,.26);box-shadow:var(--shadow-cyan)}
    .label-projects .node-title{color:#ffe18f;border-color:rgba(255,211,95,.22);box-shadow:var(--shadow-gold)}
    .label-contact .node-title{color:var(--pink-soft);border-color:rgba(255,60,214,.24);box-shadow:var(--shadow-pink)}

    .panel-overlay{
      position:fixed;
      inset:0;
      z-index:40;
      display:none;
      align-items:stretch;
      justify-content:flex-end;
      background:rgba(2,7,14,.45);
      backdrop-filter:blur(8px);
    }
    .panel-overlay.open{display:flex}

    .panel{
      width:min(700px,100vw);
      height:100%;
      background:
        linear-gradient(180deg, rgba(7,16,30,.98), rgba(5,12,22,.98)),
        radial-gradient(circle at top right, rgba(31,243,255,.07), transparent 30%);
      border-left:1px solid rgba(31,243,255,.12);
      box-shadow:-24px 0 70px rgba(0,0,0,.42);
      overflow-y:auto;
      padding:24px 24px 120px;
    }
    .panel-close{
      position:sticky;
      top:0;
      z-index:5;
      border:none;
      background:rgba(9,22,41,.92);
      color:var(--cyan-soft);
      border:1px solid rgba(31,243,255,.18);
      border-radius:999px;
      padding:10px 14px;
      font-family:var(--font-mono);
      font-size:12px;
      letter-spacing:.16em;
      text-transform:uppercase;
      cursor:pointer;
    }
    .panel-close:hover{box-shadow:var(--shadow-cyan)}

    .eyebrow{
      margin-top:18px;
      font-family:var(--font-mono);
      font-size:12px;
      letter-spacing:.24em;
      text-transform:uppercase;
      color:#9feeff;
    }
    .panel-title{
      margin:10px 0 0;
      font-family:var(--font-display);
      font-size:clamp(28px,4vw,42px);
      letter-spacing:.06em;
      text-transform:uppercase;
      color:#f4fdff;
      text-shadow:0 0 18px rgba(31,243,255,.15);
    }
    .panel-desc{
      margin-top:14px;
      color:#d6eaf8;
      font-size:15px;
      line-height:1.85;
      max-width:92%;
    }

    .glass-card{
      margin-top:18px;
      padding:18px 18px 16px;
      background:linear-gradient(180deg,rgba(11,26,48,.94),rgba(7,16,30,.94));
      border:1px solid rgba(255,255,255,.06);
      border-radius:18px;
      box-shadow:inset 0 0 0 1px rgba(255,255,255,.02), 0 16px 34px rgba(0,0,0,.22);
    }
    .glass-card h3{
      margin:0 0 10px;
      font-family:var(--font-display);
      font-size:17px;
      letter-spacing:.08em;
      text-transform:uppercase;
      color:#effbff;
    }
    .glass-card p, .glass-card li{
      color:#d0e5f2;
      font-size:14px;
      line-height:1.8;
    }
    .chips{
      display:flex;
      flex-wrap:wrap;
      gap:10px;
      margin-top:12px;
    }
    .chip{
      padding:8px 12px;
      border-radius:999px;
      border:1px solid rgba(31,243,255,.14);
      background:rgba(31,243,255,.08);
      color:#bff7ff;
      font-family:var(--font-mono);
      font-size:12px;
      letter-spacing:.06em;
      text-transform:uppercase;
    }

    .timeline-item{
      margin-top:14px;
      padding:18px 18px 18px 22px;
      border-left:2px solid rgba(31,243,255,.22);
      border-radius:0 18px 18px 0;
      background:linear-gradient(180deg,rgba(10,23,42,.92),rgba(6,14,26,.92));
      position:relative;
    }
    .timeline-item::before{
      content:"";
      position:absolute;
      left:-7px;top:22px;
      width:12px;height:12px;border-radius:50%;
      background:var(--cyan);
      box-shadow:var(--shadow-cyan);
    }
    .timeline-head{
      display:flex;
      flex-wrap:wrap;
      justify-content:space-between;
      gap:10px;
    }
    .timeline-role{
      font-family:var(--font-display);
      font-size:17px;
      letter-spacing:.05em;
      text-transform:uppercase;
      color:#f1fbff;
    }
    .timeline-date{
      font-family:var(--font-mono);
      font-size:12px;
      letter-spacing:.12em;
      text-transform:uppercase;
      color:#a5efff;
    }
    .timeline-company{
      margin-top:6px;
      color:#ff86ef;
      font-weight:700;
      letter-spacing:.04em;
    }
    .timeline-location{
      margin-top:6px;
      color:#b6d1e3;
      font-size:13px;
      font-style:italic;
    }

    .project-card{
      display:grid;
      grid-template-columns:84px 1fr;
      gap:16px;
      align-items:center;
      margin-top:16px;
      padding:16px;
      border-radius:18px;
      background:linear-gradient(180deg,rgba(12,28,50,.96),rgba(7,17,31,.96));
      border:1px solid rgba(255,255,255,.06);
      transition:transform .22s ease, box-shadow .22s ease, border-color .22s ease;
    }
    .project-card:hover{
      transform:translateY(-3px);
      border-color:rgba(31,243,255,.22);
      box-shadow:0 18px 38px rgba(0,0,0,.24), var(--shadow-cyan);
    }
    .project-icon{
      width:84px;height:84px;border-radius:20px;
      display:grid;place-items:center;
      font-size:34px;
      background:linear-gradient(135deg,rgba(31,243,255,.14),rgba(255,60,214,.12));
      border:1px solid rgba(255,255,255,.06);
    }
    .project-title{
      font-family:var(--font-display);
      font-size:17px;
      letter-spacing:.07em;
      text-transform:uppercase;
      color:#f2fbff;
      margin-bottom:6px;
    }
    .project-desc{
      color:#d4e7f3;
      font-size:14px;
      line-height:1.75;
      margin-bottom:10px;
    }
    .actions{display:flex;flex-wrap:wrap;gap:10px}
    .btn-link{
      display:inline-flex;
      align-items:center;
      justify-content:center;
      min-height:42px;
      padding:0 16px;
      border-radius:999px;
      border:1px solid rgba(31,243,255,.18);
      background:rgba(31,243,255,.07);
      color:#c9f9ff;
      font-family:var(--font-mono);
      font-size:12px;
      letter-spacing:.12em;
      text-transform:uppercase;
      text-decoration:none;
      transition:all .22s ease;
    }
    .btn-link:hover{
      transform:translateY(-2px);
      background:rgba(31,243,255,.1);
      box-shadow:var(--shadow-cyan);
    }
    .btn-link.secondary{
      border-color:rgba(255,60,214,.2);
      background:rgba(255,60,214,.07);
      color:#ffd3f5;
    }
    .btn-link.secondary:hover{box-shadow:var(--shadow-pink)}

    .contact-grid{
      display:grid;
      gap:14px;
      margin-top:18px;
    }

    .contact-row{
      display:flex;
      flex-wrap:wrap;
      gap:12px;
      align-items:center;
      justify-content:space-between;
      padding:16px 18px;
      border-radius:18px;
      background:linear-gradient(180deg,rgba(12,27,49,.94),rgba(8,17,30,.94));
      border:1px solid rgba(255,255,255,.06);
    }
    .contact-label{
      font-family:var(--font-mono);
      font-size:12px;
      letter-spacing:.18em;
      text-transform:uppercase;
      color:#a8efff;
    }
    .contact-value{
      color:#f3fbff;
      font-weight:700;
      word-break:break-word;
    }

    @keyframes pulse{
      0%,100%{opacity:.72}
      50%{opacity:1}
    }

    @media (max-width:900px){
      .hero-mark{width:250px;height:250px}
      .mark-ae{top:42px}
      .hero{transform:translateY(0)}
      .project-card{grid-template-columns:1fr}
      .panel{padding:18px 16px 90px}
      .node-label{min-width:140px}
      .node-title{min-height:46px;font-size:12px;padding:10px 16px}
      .node-sub{font-size:10px}
      .hero-name{font-size:clamp(34px,8vw,58px)}
      .hero-role{font-size:clamp(16px,3vw,22px)}
      .hero-sub{font-size:12px}
    }

    @media (prefers-reduced-motion:reduce){
      *{animation:none!important;transition:none!important}
    }
  </style>
</head>
<body>
  <canvas id="bg-canvas"></canvas>
  <div id="scene-wrap" aria-hidden="true"></div>

  <div class="center-copy">
    <div class="hero">
      <div class="hero-mark">
        <div class="ring-1"></div>
        <div class="ring-2"></div>
        <div class="mark-core"></div>
        <div class="mark-ae">AE</div>
      </div>
      <div class="hero-name">Aathi Eshwar</div>
      <div class="hero-role">Creative Technologist</div>
      <div class="hero-sub">Game Designer &nbsp;|&nbsp; UI/UX Designer</div>
      <div class="hero-hint">Drag to orbit · Scroll to zoom · Click any node to explore</div>
    </div>
  </div>

  <div id="labels">
    <div class="node-label label-about" data-panel="about">
      <div class="node-icon">🛰️</div>
      <div class="node-title">About Me</div>
      <div class="node-sub">Identity</div>
    </div>

    <div class="node-label label-skills" data-panel="skills">
      <div class="node-icon">⚙️</div>
      <div class="node-title">Skills</div>
      <div class="node-sub">Arsenal</div>
    </div>

    <div class="node-label label-experience" data-panel="experience">
      <div class="node-icon">🪐</div>
      <div class="node-title">Experience</div>
      <div class="node-sub">History</div>
    </div>

    <div class="node-label label-projects" data-panel="projects">
      <div class="node-icon">🚀</div>
      <div class="node-title">Projects</div>
      <div class="node-sub">Featured Work</div>
    </div>

    <div class="node-label label-contact" data-panel="contact">
      <div class="node-icon">📡</div>
      <div class="node-title">Contact</div>
    </div>
  </div>

  <div class="panel-overlay" id="panelOverlay" aria-hidden="true">
    <aside class="panel" role="dialog" aria-modal="true" aria-labelledby="panelTitle">
      <button class="panel-close" id="panelClose" type="button">← Close Panel</button>
      <div id="panelContent"></div>
    </aside>
  </div>

  <script type="module">
    import * as THREE from "https://unpkg.com/three@0.161.0/build/three.module.js";
    import { OrbitControls } from "https://unpkg.com/three@0.161.0/examples/jsm/controls/OrbitControls.js";

    const panelData = {

    const overlay = document.getElementById("panelOverlay");

    function openPanel(key){
      const data = panelData[key];
      if(!data) return;
      panelContent.innerHTML = `
        <div class="eyebrow">${data.eyebrow}</div>
        <h2 class="panel-title" id="panelTitle">${data.title}</h2>
        <div class="panel-desc">${data.desc}</div>

      `;
      overlay.classList.add("open");
      overlay.setAttribute("aria-hidden","false");
    }

    function closePanel(){
      overlay.classList.remove("open");
      overlay.setAttribute("aria-hidden","true");
    }

    document.querySelectorAll(".node-label").forEach(label=>{
      label.addEventListener("click", ()=> openPanel(label.dataset.panel));
    });
    panelClose.addEventListener("click", closePanel);
    overlay.addEventListener("click", (e)=>{ if(e.target === overlay) closePanel(); });
    document.addEventListener("keydown", (e)=>{ if(e.key === "Escape" && overlay.classList.contains("open")) closePanel(); });

    // 2D star background
    const bgCanvas = document.getElementById("bg-canvas");
    const bgCtx = bgCanvas.getContext("2d");
    let sw = 0, sh = 0, stars = [];

    function resizeBg(){
      sw = window.innerWidth;
      sh = window.innerHeight;
      bgCanvas.width = sw * devicePixelRatio;
      bgCanvas.height = sh * devicePixelRatio;
      bgCanvas.style.width = sw + "px";
      bgCanvas.style.height = sh + "px";
      bgCtx.setTransform(devicePixelRatio,0,0,devicePixelRatio,0,0);
      stars = Array.from({length: Math.min(240, Math.max(120, Math.floor(sw * sh / 9000)))}, ()=>({
        x: Math.random()*sw,
        y: Math.random()*sh,
        r: Math.random()*1.7 + .35,
        a: Math.random()*.8 + .15,
        v: Math.random()*.15 + .02,
        c: Math.random()>.9 ? (Math.random()>.5 ? "31,243,255" : "255,60,214") : "255,255,255"
      }));
    }

    function drawBg(time=0){
      bgCtx.clearRect(0,0,sw,sh);
      for(const s of stars){
        const tw = .45 + Math.sin(time*.001 + s.x*.01)*.35;
        bgCtx.beginPath();
        bgCtx.fillStyle = `rgba(${s.c}, ${Math.max(.06, s.a*tw)})`;
        bgCtx.arc(s.x, s.y, s.r, 0, Math.PI*2);
        bgCtx.fill();
        s.y += s.v;
        if(s.y > sh + 3){ s.y = -3; s.x = Math.random()*sw; }
      }

      const horizonY = sh * 0.66;
      bgCtx.strokeStyle = "rgba(31,243,255,.08)";
      bgCtx.lineWidth = 1;
      const spacing = 44;
      const offset = (time * 0.02) % spacing;

      for(let y = horizonY; y < sh + spacing; y += spacing){
        const p = (y - horizonY + offset) / (sh - horizonY + 1);
        const spread = 1 + p * 8.5;
        bgCtx.beginPath();
        bgCtx.moveTo(sw * .5 - sw * spread, y);
        bgCtx.lineTo(sw * .5 + sw * spread, y);
        bgCtx.stroke();
      }
      for(let x = -sw; x <= sw * 2; x += spacing){
        bgCtx.beginPath();
        bgCtx.moveTo(x, sh);
        bgCtx.lineTo(sw / 2, horizonY);
        bgCtx.stroke();
      }

      requestAnimationFrame(drawBg);
    }

    resizeBg();
    requestAnimationFrame(drawBg);

    const rocketGroup = new THREE.Group();

    flame.position.set(0.34, -0.18, 0);

    rocketGroup.add(rocketBody, flame);

    const labelAnchors = {
      about: { el: document.querySelector(".label-about"), object: aboutGroup, offsetY: 1.8 },
      skills: { el: document.querySelector(".label-skills"), object: skillsGroup, offsetY: 1.8 },
      experience: { el: document.querySelector(".label-experience"), object: expGroup, offsetY: 1.9 },
      projects: { el: document.querySelector(".label-projects"), object: projGroup, offsetY: 1.75 },
      contact: { el: document.querySelector(".label-contact"), object: contactGroup, offsetY: 1.65 },
    };

    function updateLabels(){
      Object.values(labelAnchors).forEach(item=>{
        const pos = item.object.getWorldPosition(new THREE.Vector3());
        pos.y += item.offsetY;
        pos.project(camera);
        const x = (pos.x * 0.5 + 0.5) * window.innerWidth;
        const y = (-pos.y * 0.5 + 0.5) * window.innerHeight;
        const visible = pos.z < 1;
        item.el.style.left = x + "px";
        item.el.style.top = y + "px";
        item.el.style.opacity = visible ? "1" : "0";
      });
    }

    let t = 0;
    function animate(){
      requestAnimationFrame(animate);
      t += 0.01;
      controls.update();

      aboutMoonPivot.rotation.z += 0.02;
      aboutSphere.rotation.y += 0.003;
      aboutGroup.rotation.y += 0.002;

      skillsKnot.rotation.x += 0.01;
      skillsKnot.rotation.y += 0.008;

      expGroup.rotation.y += 0.003;
      expMoon.position.x = Math.cos(t*1.4) * 2.15;
      expMoon.position.z = Math.sin(t*1.4) * 0.6;
      expMoon.position.y = Math.sin(t*1.4) * 0.18;

      projGroup.rotation.y += 0.012;
      projGroup.position.y = -0.2 + Math.sin(t*1.8) * 0.08;

      contactGroup.rotation.y += 0.01;
      contactRing1.rotation.z += 0.015;

      deco1.position.y = 4.8 + Math.sin(t * 0.9) * 0.12;

      rocketGroup.position.x = 8.1 + Math.sin(t * 1.2) * 0.35;
      rocketGroup.position.y = 0.4 + Math.cos(t * 1.2) * 0.18;

      renderer.render(scene, camera);
      updateLabels();
    }
    animate();

    function onResize(){
      resizeBg();
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
      updateLabels();
    }
    window.addEventListener("resize", onResize);
