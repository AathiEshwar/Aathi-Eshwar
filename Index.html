<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Aathi Eshwar — Creative Technologist</title>
  <meta
    name="description"
    content="Premium interactive portfolio of Aathi Eshwar — UI/UX Designer, Game Designer, and 3D Generalist."
  />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700;800;900&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap"
    rel="stylesheet"
  />
  <style>
    :root {
      --bg-0: #02040a;
      --bg-1: #051120;
      --bg-2: #08192e;
      --panel: rgba(7, 18, 34, 0.86);
      --panel-2: rgba(8, 24, 45, 0.94);
      --border: rgba(0, 245, 255, 0.15);
      --cyan: #00eaff;
      --cyan-2: #5df7ff;
      --pink: #ff00c8;
      --pink-2: #ff5de8;
      --gold: #ffc857;
      --gold-2: #ffdf95;
      --white: #eaf7ff;
      --muted: #9db7ca;
      --soft: rgba(234, 247, 255, 0.75);
      --shadow-cyan: 0 0 12px rgba(0, 234, 255, 0.55), 0 0 32px rgba(0, 234, 255, 0.22);
      --shadow-pink: 0 0 12px rgba(255, 0, 200, 0.55), 0 0 32px rgba(255, 0, 200, 0.22);
      --shadow-gold: 0 0 12px rgba(255, 200, 87, 0.5), 0 0 28px rgba(255, 200, 87, 0.18);
      --font-display: "Orbitron", sans-serif;
      --font-body: "Inter", sans-serif;
      --font-mono: "JetBrains Mono", monospace;
      --radius-xl: 24px;
      --radius-lg: 18px;
      --radius-md: 14px;
      --trans: 220ms ease;
    }

    * { box-sizing: border-box; }
    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background:
        radial-gradient(circle at 50% 45%, rgba(0, 234, 255, 0.12), transparent 18%),
        radial-gradient(circle at 50% 55%, rgba(255, 0, 200, 0.08), transparent 24%),
        linear-gradient(180deg, #02040a 0%, #04101e 45%, #02040a 100%);
      color: var(--white);
      font-family: var(--font-body);
    }

    body::before {
      content: "";
      position: fixed;
      inset: 0;
      background:
        repeating-linear-gradient(
          180deg,
          rgba(255,255,255,0) 0px,
          rgba(255,255,255,0) 3px,
          rgba(0, 234, 255, 0.02) 4px
        );
      pointer-events: none;
      mix-blend-mode: screen;
      opacity: 0.32;
      z-index: 20;
    }

    body::after {
      content: "";
      position: fixed;
      inset: 0;
      background: radial-gradient(circle at center, transparent 46%, rgba(0,0,0,0.35) 100%);
      pointer-events: none;
      z-index: 2;
    }

    a { color: inherit; text-decoration: none; }

    #starfield,
    #gridCanvas {
      position: fixed;
      inset: 0;
      width: 100%;
      height: 100%;
      display: block;
    }

    #starfield { z-index: 0; }
    #gridCanvas { z-index: 1; opacity: 0.7; }

    .space-objects {
      position: fixed;
      inset: 0;
      z-index: 3;
      pointer-events: none;
      overflow: hidden;
    }

    .planet {
      position: absolute;
      border-radius: 50%;
      filter: drop-shadow(0 0 24px rgba(0, 234, 255, 0.35));
      opacity: 0.95;
      animation: floatSlow 8s ease-in-out infinite;
    }

    .planet.one {
      width: 150px; height: 150px;
      top: 44px; right: 74px;
      background: radial-gradient(circle at 35% 35%, #5df7ff 0%, #3a9fff 45%, #795eff 100%);
    }

    .planet.one::after {
      content: "";
      position: absolute;
      inset: -14px -26px;
      border: 4px solid rgba(163, 245, 255, 0.65);
      border-left-color: transparent;
      border-right-color: transparent;
      border-radius: 50%;
      transform: rotate(-25deg);
    }

    .asteroid {
      position: absolute;
      width: 18px;
      height: 18px;
      border-radius: 50% 40% 58% 42%;
      background: linear-gradient(135deg, #6a7589, #9aa5b8);
      box-shadow: 0 0 10px rgba(255,255,255,0.18);
      opacity: 0.6;
      animation: drift 18s linear infinite;
    }

    .asteroid.a1 { top: 12%; left: 62%; animation-duration: 22s; }
    .asteroid.a2 { top: 78%; right: 4%; width: 24px; height: 16px; animation-duration: 26s; }
    .asteroid.a3 { bottom: 10%; right: 10%; width: 12px; height: 12px; animation-duration: 18s; }

    .rocket {
      position: absolute;
      width: 70px;
      height: 24px;
      right: 14%;
      top: 40%;
      transform: rotate(-30deg);
      animation: rocketFly 11s ease-in-out infinite;
      filter: drop-shadow(0 0 12px rgba(255, 200, 87, 0.45));
    }

    .rocket::before {
      content: "";
      position: absolute;
      width: 42px;
      height: 14px;
      right: 10px;
      top: 5px;
      border-radius: 10px 12px 12px 10px;
      background: linear-gradient(90deg, #ffffff, #86f7ff);
    }

    .rocket::after {
      content: "";
      position: absolute;
      left: 4px;
      top: 7px;
      width: 18px;
      height: 10px;
      background: linear-gradient(90deg, rgba(255, 84, 84, 0.95), rgba(255, 196, 0, 0.95));
      clip-path: polygon(100% 50%, 0 0, 0 100%);
      box-shadow: 0 0 12px rgba(255, 172, 38, 0.6);
    }

    .rocket .fin {
      position: absolute;
      width: 10px; height: 10px;
      background: #ff4ed9;
      right: 18px;
      clip-path: polygon(0 0, 100% 40%, 10% 100%);
    }
    .rocket .fin.top { top: 0; }
    .rocket .fin.bottom { bottom: 0; transform: scaleY(-1); }

    .satellite {
      position: absolute;
      bottom: 18%;
      left: 58%;
      width: 56px;
      height: 30px;
      transform: rotate(18deg);
      opacity: 0.85;
      animation: floatSlow 7s ease-in-out infinite;
    }

    .satellite::before,
    .satellite::after {
      content: "";
      position: absolute;
      top: 7px;
      width: 18px; height: 14px;
      background: linear-gradient(180deg, #73d9ff, #2d6cff);
      box-shadow: inset 0 0 0 1px rgba(255,255,255,0.2);
    }
    .satellite::before { left: 0; }
    .satellite::after { right: 0; }
    .satellite .body {
      position: absolute;
      left: 18px;
      top: 6px;
      width: 20px;
      height: 16px;
      border-radius: 8px;
      background: linear-gradient(180deg, #dce7f3, #97a9bc);
      box-shadow: 0 0 12px rgba(255,255,255,0.18);
    }
    .satellite .dish {
      position: absolute;
      left: 23px;
      top: 16px;
      width: 14px;
      height: 14px;
      border: 2px solid #dce7f3;
      border-top-color: transparent;
      border-left-color: transparent;
      border-radius: 50%;
      transform: rotate(45deg);
    }

    .main {
      position: relative;
      z-index: 5;
      width: 100%;
      height: 100%;
      overflow: hidden;
    }

    .hero {
      position: absolute;
      inset: 0;
      display: grid;
      place-items: center;
      pointer-events: none;
      z-index: 6;
    }

    .hero-inner {
      text-align: center;
      max-width: 900px;
      padding: 24px;
    }

    .ae-mark {
      position: relative;
      width: 300px;
      height: 300px;
      margin: 0 auto 10px;
      display: grid;
      place-items: center;
    }

    .ae-ring,
    .ae-ring-2 {
      position: absolute;
      border-radius: 50%;
      inset: 0;
      border: 4px solid rgba(0, 234, 255, 0.75);
      box-shadow: var(--shadow-cyan);
    }

    .ae-ring-2 {
      inset: 48px;
      border-color: rgba(255, 0, 200, 0.62);
      transform: rotate(-22deg);
      box-shadow: var(--shadow-pink);
    }

    .ae-core {
      width: 110px;
      height: 110px;
      border-radius: 50%;
      background:
        radial-gradient(circle at 32% 28%, #75ffff 0%, #2cb3ff 38%, #1f2f88 100%);
      box-shadow: 0 0 35px rgba(0, 234, 255, 0.45);
      position: relative;
      overflow: hidden;
    }

    .ae-core::before,
    .ae-core::after {
      content: "";
      position: absolute;
      inset: 14px;
      border-radius: 50%;
      border: 1px solid rgba(155, 236, 255, 0.35);
      transform: rotate(18deg);
    }

    .ae-core::after {
      inset: 26px 10px;
      transform: rotate(-25deg);
    }

    .ae-text {
      position: absolute;
      top: 28px;
      font-family: var(--font-display);
      font-size: clamp(72px, 9vw, 112px);
      font-weight: 900;
      letter-spacing: 0.04em;
      color: var(--cyan);
      text-shadow:
        0 0 6px rgba(0, 234, 255, 0.9),
        0 0 18px rgba(0, 234, 255, 0.8),
        0 0 50px rgba(0, 234, 255, 0.4),
        0 0 90px rgba(0, 234, 255, 0.2);
    }

    .hero-name {
      margin-top: -14px;
      font-family: var(--font-display);
      font-weight: 800;
      font-size: clamp(36px, 5vw, 62px);
      letter-spacing: 0.12em;
      color: #eef8ff;
      text-shadow:
        0 0 8px rgba(255,255,255,0.65),
        0 0 20px rgba(0, 234, 255, 0.25),
        0 0 36px rgba(0, 234, 255, 0.18);
    }

    .hero-role {
      margin-top: 10px;
      font-family: var(--font-display);
      font-size: clamp(16px, 2vw, 24px);
      color: #ff75ef;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      text-shadow:
        0 0 10px rgba(255, 0, 200, 0.75),
        0 0 24px rgba(255, 0, 200, 0.35);
    }

    .hero-sub {
      margin-top: 24px;
      font-family: var(--font-mono);
      font-size: clamp(12px, 1.5vw, 18px);
      color: #b8ecff;
      letter-spacing: 0.24em;
      text-transform: uppercase;
      text-shadow: 0 0 12px rgba(0, 234, 255, 0.22);
    }

    .hero-hint {
      margin-top: 30px;
      font-family: var(--font-mono);
      font-size: 14px;
      color: rgba(184, 236, 255, 0.76);
      letter-spacing: 0.24em;
      text-transform: uppercase;
      text-shadow: 0 0 10px rgba(0, 234, 255, 0.18);
      animation: pulseHint 2.2s ease-in-out infinite;
    }

    .nodes {
      position: absolute;
      inset: 0;
      z-index: 8;
      pointer-events: none;
    }

    .node {
      position: absolute;
      width: 250px;
      height: 250px;
      pointer-events: auto;
      cursor: pointer;
      user-select: none;
      transform: translate(-50%, -50%);
    }

    .node-bg {
      position: absolute;
      inset: 18px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(0, 234, 255, 0.08), rgba(255, 0, 200, 0.04), transparent 72%);
      filter: blur(0.2px);
    }

    .node-label-wrap {
      position: absolute;
      left: 50%;
      top: 22px;
      transform: translateX(-50%);
      text-align: center;
      z-index: 3;
    }

    .node-title {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-width: 165px;
      min-height: 50px;
      padding: 12px 22px;
      background: linear-gradient(180deg, rgba(9,28,47,0.82), rgba(8,17,33,0.82));
      clip-path: polygon(12px 0, 100% 0, calc(100% - 12px) 100%, 0 100%);
      border: 1px solid rgba(255,255,255,0.06);
      box-shadow: inset 0 0 0 1px rgba(255,255,255,0.04);
      font-family: var(--font-display);
      font-size: 14px;
      font-weight: 700;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      backdrop-filter: blur(12px);
    }

    .node-sub {
      margin-top: 8px;
      font-family: var(--font-mono);
      font-size: 13px;
      letter-spacing: 0.18em;
      color: rgba(234, 247, 255, 0.86);
      text-transform: uppercase;
    }

    .node-icon {
      position: absolute;
      top: -8px;
      left: 50%;
      transform: translateX(-50%);
      font-size: 26px;
      filter: drop-shadow(0 0 8px rgba(255,255,255,0.3));
    }

    .node-graphic {
      position: absolute;
      inset: 56px 26px 22px;
      display: grid;
      place-items: center;
      z-index: 2;
      transition: transform var(--trans), filter var(--trans);
    }

    .node:hover .node-graphic,
    .node:focus-visible .node-graphic {
      transform: translateY(-4px) scale(1.03);
      filter: brightness(1.1);
    }

    .node:hover .node-title,
    .node:focus-visible .node-title {
      transform: translateY(-2px);
    }

    .node button {
      all: unset;
      position: absolute;
      inset: 0;
      border-radius: 999px;
    }

    .node:focus-within {
      outline: none;
    }

    .node button:focus-visible {
      box-shadow: 0 0 0 2px rgba(255,255,255,0.2), 0 0 0 5px rgba(0,234,255,0.3);
      border-radius: 50%;
    }

    /* About node */
    .about-node { left: 15%; top: 26%; }
    .about-node .node-title { color: var(--cyan-2); border-color: rgba(0,234,255,0.28); box-shadow: var(--shadow-cyan); }
    .about-node .orbital {
      position: relative;
      width: 165px; height: 165px;
      border-radius: 50%;
      background: radial-gradient(circle at 35% 32%, #72ffff 0%, #18d4f5 36%, #2d4aff 100%);
      box-shadow: 0 0 28px rgba(0,234,255,0.35);
      overflow: visible;
    }
    .about-node .orbital::before {
      content: "";
      position: absolute;
      inset: -22px;
      border-radius: 50%;
      border: 4px solid rgba(0, 234, 255, 0.55);
      border-left-color: transparent;
      border-right-color: transparent;
      transform: rotate(-12deg);
    }
    .about-node .orbital::after {
      content: "";
      position: absolute;
      inset: 14px;
      border-radius: 50%;
      border: 1px solid rgba(255,255,255,0.18);
    }
    .about-node .moon {
      position: absolute;
      width: 18px; height: 18px;
      border-radius: 50%;
      background: linear-gradient(180deg, #f7fcff, #9bdcff);
      top: 66px; right: -12px;
      box-shadow: 0 0 10px rgba(255,255,255,0.3);
      animation: tinyOrbit 4s linear infinite;
      transform-origin: -72px 18px;
    }

    /* Skills node */
    .skills-node { right: 15%; top: 26%; }
    .skills-node .node-title { color: #ff64e3; border-color: rgba(255,0,200,0.28); box-shadow: var(--shadow-pink); }
    .skills-node .knot {
      position: relative;
      width: 160px; height: 160px;
    }
    .skills-node .knot::before,
    .skills-node .knot::after {
      content: "";
      position: absolute;
      inset: 18px;
      border-radius: 50% 40% 55% 45% / 44% 56% 44% 56%;
      border: 16px solid #ff25d4;
      box-shadow:
        0 0 20px rgba(255,0,200,0.4),
        inset 0 0 10px rgba(255,255,255,0.15);
      transform: rotate(35deg);
      filter: saturate(1.15);
    }
    .skills-node .knot::after {
      inset: 22px 26px;
      border-color: #a93aff;
      transform: rotate(-35deg);
    }

    /* Experience node */
    .experience-node { left: 13%; bottom: 16%; }
    .experience-node .node-title { color: var(--cyan-2); border-color: rgba(0,234,255,0.28); box-shadow: var(--shadow-cyan); }
    .experience-node .ringed {
      position: relative;
      width: 166px; height: 166px;
      border-radius: 50%;
      background: radial-gradient(circle at 35% 32%, #6cffff 0%, #1fd7ee 34%, #3f54ff 100%);
      box-shadow: 0 0 28px rgba(0,234,255,0.28);
    }
    .experience-node .ringed::before {
      content: "";
      position: absolute;
      inset: -8px -22px;
      border-radius: 50%;
      border: 10px solid rgba(232, 248, 255, 0.78);
      border-left-color: transparent;
      border-right-color: transparent;
      transform: rotate(-18deg);
      opacity: 0.88;
    }
    .experience-node .mini {
      position: absolute;
      width: 22px; height: 22px;
      border-radius: 50%;
      background: radial-gradient(circle at 35% 35%, #ffffff, #97ecff);
      right: -8px; top: 78px;
      box-shadow: 0 0 12px rgba(255,255,255,0.3);
    }

    /* Projects node */
    .projects-node { right: 10%; top: 48%; }
    .projects-node .node-title { color: var(--gold-2); border-color: rgba(255,200,87,0.28); box-shadow: var(--shadow-gold); }
    .projects-node .crystal {
      width: 128px;
      height: 156px;
      background: linear-gradient(180deg, #ffe484 0%, #8dffea 42%, #f8b900 100%);
      clip-path: polygon(50% 0%, 88% 28%, 74% 100%, 26% 100%, 12% 28%);
      box-shadow:
        0 0 24px rgba(255,200,87,0.28),
        inset 0 0 16px rgba(255,255,255,0.28);
      position: relative;
    }
    .projects-node .crystal::before {
      content: "";
      position: absolute;
      inset: 0;
      background: linear-gradient(115deg, rgba(255,255,255,0.15), transparent 34%, rgba(255,255,255,0.22) 58%, transparent 72%);
      clip-path: inherit;
    }

    /* Contact node */
    .contact-node { left: 50%; bottom: 9%; }
    .contact-node .node-title { color: #ff64e3; border-color: rgba(255,0,200,0.28); box-shadow: var(--shadow-pink); }
    .contact-node .signal {
      position: relative;
      width: 132px; height: 156px;
      clip-path: polygon(50% 0%, 90% 46%, 50% 100%, 10% 46%);
      background: linear-gradient(180deg, #9d66ff 0%, #711cff 42%, #291d7b 100%);
      box-shadow: 0 0 22px rgba(255,0,200,0.25), inset 0 0 18px rgba(255,255,255,0.14);
    }
    .contact-node .signal::before,
    .contact-node .signal::after {
      content: "";
      position: absolute;
      inset: 12px -16px;
      border-radius: 50%;
      border: 4px solid rgba(255, 0, 200, 0.55);
      border-left-color: transparent;
      border-right-color: transparent;
      transform: rotate(16deg);
    }
    .contact-node .signal::after {
      inset: 28px -6px;
      border-color: rgba(0, 234, 255, 0.55);
      transform: rotate(-18deg);
    }

    .panel-overlay {
      position: fixed;
      inset: 0;
      z-index: 50;
      display: none;
      align-items: stretch;
      justify-content: flex-end;
      background: rgba(2, 6, 12, 0.45);
      backdrop-filter: blur(8px);
    }

    .panel-overlay.open { display: flex; }

    .panel {
      width: min(680px, 100vw);
      height: 100%;
      background:
        linear-gradient(180deg, rgba(7, 16, 30, 0.98), rgba(4, 11, 22, 0.98)),
        radial-gradient(circle at top right, rgba(0,234,255,0.08), transparent 30%);
      border-left: 1px solid rgba(0, 234, 255, 0.14);
      box-shadow: -30px 0 80px rgba(0,0,0,0.45);
      overflow-y: auto;
      padding: 28px 28px 120px;
      position: relative;
    }

    .panel-close {
      position: sticky;
      top: 0;
      z-index: 5;
      display: inline-flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 10px;
      padding: 10px 14px;
      border: 1px solid rgba(0,234,255,0.18);
      border-radius: 999px;
      background: rgba(9, 24, 43, 0.88);
      color: var(--cyan-2);
      font-family: var(--font-mono);
      font-size: 12px;
      letter-spacing: 0.16em;
      text-transform: uppercase;
      cursor: pointer;
      transition: var(--trans);
    }

    .panel-close:hover { box-shadow: var(--shadow-cyan); transform: translateY(-1px); }

    .panel-header {
      margin-top: 16px;
      margin-bottom: 20px;
    }

    .eyebrow {
      font-family: var(--font-mono);
      font-size: 12px;
      letter-spacing: 0.24em;
      text-transform: uppercase;
      color: #9feeff;
      margin-bottom: 10px;
    }

    .panel-title {
      font-family: var(--font-display);
      font-size: clamp(28px, 4vw, 42px);
      letter-spacing: 0.05em;
      margin: 0;
      text-transform: uppercase;
      color: #f3fbff;
      text-shadow: 0 0 20px rgba(0,234,255,0.18);
    }

    .panel-desc {
      margin-top: 12px;
      max-width: 90%;
      color: var(--soft);
      font-size: 15px;
      line-height: 1.8;
    }

    .section-grid {
      display: grid;
      gap: 16px;
      margin-top: 22px;
    }

    .glass-card {
      background: linear-gradient(180deg, rgba(11, 25, 45, 0.92), rgba(7, 16, 30, 0.92));
      border: 1px solid rgba(255,255,255,0.06);
      border-radius: var(--radius-lg);
      padding: 18px 18px 16px;
      box-shadow:
        inset 0 0 0 1px rgba(255,255,255,0.02),
        0 18px 40px rgba(0,0,0,0.24);
    }

    .glass-card h3 {
      margin: 0 0 8px;
      font-family: var(--font-display);
      font-size: 17px;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: #f0fbff;
    }

    .glass-card p,
    .glass-card li {
      color: var(--soft);
      font-size: 14px;
      line-height: 1.75;
    }

    .meta {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin-top: 12px;
    }

    .chip {
      padding: 8px 12px;
      border-radius: 999px;
      background: rgba(0, 234, 255, 0.08);
      border: 1px solid rgba(0, 234, 255, 0.14);
      color: #c1f7ff;
      font-family: var(--font-mono);
      font-size: 12px;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    .timeline {
      display: grid;
      gap: 14px;
      margin-top: 18px;
    }

    .timeline-item {
      position: relative;
      padding: 18px 18px 18px 22px;
      border-left: 2px solid rgba(0,234,255,0.22);
      background: linear-gradient(180deg, rgba(9, 21, 38, 0.88), rgba(6, 15, 28, 0.88));
      border-radius: 0 var(--radius-lg) var(--radius-lg) 0;
    }

    .timeline-item::before {
      content: "";
      position: absolute;
      left: -7px;

        </div>

      `;

      overlay.classList.add("open");
      overlay.setAttribute("aria-hidden", "false");
      document.body.style.overflow = window.innerWidth > 900 ? "hidden" : "auto";
    }

    function closePanel() {
      overlay.classList.remove("open");
      overlay.setAttribute("aria-hidden", "true");
      document.body.style.overflow = window.innerWidth > 900 ? "hidden" : "auto";
    }

    document.querySelectorAll(".node").forEach(node => {
      node.addEventListener("click", () => openPanel(node.dataset.panel));
      node.addEventListener("keydown", (e) => {
        if (e.key === "Enter" || e.key === " ") {
          e.preventDefault();
          openPanel(node.dataset.panel);
        }
      });
    });

    panelClose.addEventListener("click", closePanel);
    overlay.addEventListener("click", (e) => {
      if (e.target === overlay) closePanel();
    });
    document.addEventListener("keydown", (e) => {
      if (e.key === "Escape" && overlay.classList.contains("open")) closePanel();
    });

    // Starfield
    const starCanvas = document.getElementById("starfield");
    const starCtx = starCanvas.getContext("2d");
    const gridCanvas = document.getElementById("gridCanvas");
    const gridCtx = gridCanvas.getContext("2d");

    let width = 0;
    let height = 0;
    let stars = [];

    function resizeCanvases() {
      width = window.innerWidth;
      height = window.innerHeight;
      starCanvas.width = width * devicePixelRatio;
      starCanvas.height = height * devicePixelRatio;
      gridCanvas.width = width * devicePixelRatio;
      gridCanvas.height = height * devicePixelRatio;
      starCanvas.style.width = width + "px";
      starCanvas.style.height = height + "px";
      gridCanvas.style.width = width + "px";
      gridCanvas.style.height = height + "px";
      starCtx.setTransform(devicePixelRatio, 0, 0, devicePixelRatio, 0, 0);
      gridCtx.setTransform(devicePixelRatio, 0, 0, devicePixelRatio, 0, 0);
      buildStars();
      drawGrid(0);
    }

    function buildStars() {
      const count = Math.min(220, Math.max(120, Math.floor((width * height) / 9000)));
      stars = Array.from({ length: count }, () => ({
        x: Math.random() * width,
        y: Math.random() * height,
        r: Math.random() * 1.8 + 0.4,
        a: Math.random() * 0.9 + 0.1,
        s: Math.random() * 0.2 + 0.02,
        tint: Math.random() > 0.86
          ? (Math.random() > 0.5 ? "0,234,255" : "255,0,200")
          : "255,255,255"
      }));
    }

    function drawGrid(time) {
      gridCtx.clearRect(0, 0, width, height);

      const horizonY = height * 0.58;
      const spacing = 48;
      const offset = (time * 0.02) % spacing;

      gridCtx.strokeStyle = "rgba(0,234,255,0.08)";
      gridCtx.lineWidth = 1;

      for (let y = horizonY; y < height + spacing; y += spacing) {
        const p = (y - horizonY + offset) / (height - horizonY + 1);
        const scale = 1 + p * 9;
        gridCtx.beginPath();
        gridCtx.moveTo(width * 0.5 - width * scale, y);
        gridCtx.lineTo(width * 0.5 + width * scale, y);
        gridCtx.stroke();
      }

      for (let x = -width; x <= width * 2; x += spacing) {
        gridCtx.beginPath();
        gridCtx.moveTo(x, height);
        gridCtx.lineTo(width / 2, horizonY);
        gridCtx.stroke();
      }

      gridCtx.fillStyle = "rgba(0,0,0,0.15)";
      gridCtx.fillRect(0, horizonY - 1, width, 2);
    }

    function render(time = 0) {
      starCtx.clearRect(0, 0, width, height);

      for (const star of stars) {
        const twinkle = 0.45 + Math.sin((time * 0.001) + (star.x * 0.01)) * 0.35;
        starCtx.beginPath();
        starCtx.fillStyle = `rgba(${star.tint}, ${Math.max(0.08, star.a * twinkle)})`;
        starCtx.arc(star.x, star.y, star.r, 0, Math.PI * 2);
        starCtx.fill();

        star.y += star.s;
        if (star.y > height + 4) {
          star.y = -4;
          star.x = Math.random() * width;
        }
      }

      drawGrid(time);
      requestAnimationFrame(render);
    }

    resizeCanvases();
    requestAnimationFrame(render);
    window.addEventListener("resize", resizeCanvases);
  </script>
</body>
</html>
