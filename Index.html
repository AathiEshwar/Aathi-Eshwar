<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Aathi Eshwar — Creative Technologist</title>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&display=swap" rel="stylesheet">

<style>
body{
  margin:0;
  background:#020408;
  overflow:hidden;
  font-family:'Orbitron',sans-serif;
  color:white;
}

/* ================= BACKGROUND ================= */
canvas{
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
}

/* ================= CENTER TEXT ================= */
.center{
  position:absolute;
  top:50%;
  left:50%;
  transform:translate(-50%,-50%);
  text-align:center;
}

/* AE LOGO */
.logo{
  font-size:120px;
  color:#00f5ff;
  text-shadow:
    0 0 20px #00f5ff,
    0 0 40px #00f5ff,
    0 0 80px rgba(0,245,255,0.6);
}

/* NAME */
.name{
  font-size:48px;
  letter-spacing:6px;
  color:#e2f0ff;
  text-shadow:
    0 0 10px rgba(255,255,255,0.6),
    0 0 25px rgba(0,245,255,0.4);
}

/* TAGLINE */
.tagline{
  margin-top:10px;
  color:#ff00cc;
  font-size:16px;
  text-shadow:
    0 0 10px #ff00cc,
    0 0 20px rgba(255,0,204,0.6);
}

/* ================= NODES ================= */
.node{
  position:absolute;
  text-align:center;
  cursor:pointer;
}

.node h3{
  font-size:14px;
  margin-top:10px;
  letter-spacing:2px;
}

/* ABOUT */
.about{
  top:20%;
  left:10%;
  color:#00f5ff;
}

/* SKILLS */
.skills{
  top:20%;
  right:10%;
  color:#ff00cc;
}

/* PROJECTS */
.projects{
  top:45%;
  right:8%;
  color:#ffc848;
}

/* EXPERIENCE */
.exp{
  bottom:20%;
  left:10%;
  color:#00f5ff;
}

/* CONTACT */
.contact{
  bottom:10%;
  left:50%;
  transform:translateX(-50%);
  color:#ff00cc;
}

/* ================= CONTACT PANEL ================= */
.contact-panel{
  position:fixed;
  bottom:0;
  left:0;
  width:100%;
  background:#050d1a;
  padding:20px;
  text-align:center;
  border-top:1px solid rgba(0,245,255,0.3);
}

.contact-panel a{
  color:#00f5ff;
  font-size:18px;
  text-decoration:none;
  text-shadow:
    0 0 10px #00f5ff,
    0 0 20px rgba(0,245,255,0.6);
}

.contact-panel a:hover{
  color:#ff00cc;
}

/* ================= FLOATING ELEMENTS ================= */
.star{
  position:absolute;
  width:2px;
  height:2px;
  background:white;
  opacity:0.5;
}
</style>
</head>

<body>

<canvas id="bg"></canvas>

<!-- CENTER -->
<div class="center">
  <div class="logo">AE</div>
  <div class="name">AATHI ESHWAR</div>
  <div class="tagline">// Creative Technologist //</div>
</div>

<!-- NODES -->
<div class="node about">
  🌐
  <h3>ABOUT ME</h3>
</div>

<div class="node skills">
  ⚡
  <h3>SKILLS</h3>
</div>

<div class="node projects">
  🚀
  <h3>PROJECTS</h3>
</div>

<div class="node exp">
  🪐
  <h3>EXPERIENCE</h3>
</div>

<div class="node contact">
  📡
  <h3>CONTACT</h3>
</div>

<!-- CONTACT PANEL -->
<div class="contact-panel">
  <a href="mailto:athie281@gmail.com">athie281@gmail.com</a>
</div>

<!-- SIMPLE SPACE BG -->
<script>
const canvas = document.getElementById("bg");
const ctx = canvas.getContext("2d");

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

let stars = [];

for(let i=0;i<200;i++){
  stars.push({
    x:Math.random()*canvas.width,
    y:Math.random()*canvas.height,
    r:Math.random()*2
  });
}

function animate(){
  ctx.clearRect(0,0,canvas.width,canvas.height);

  ctx.fillStyle="white";
  stars.forEach(s=>{
    ctx.beginPath();
    ctx.arc(s.x,s.y,s.r,0,Math.PI*2);
    ctx.fill();
  });

  requestAnimationFrame(animate);
}
animate();
</script>

</body>
</html>
